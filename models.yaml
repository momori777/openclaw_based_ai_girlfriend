# 模型清单 — AI Girlfriend 四季夏目
#
# 所有模型托管在 HuggingFace:
#   https://huggingface.co/TAOTAO777/ai-girlfriend-natsume
#
# 下载方式:
#   huggingface-cli download TAOTAO777/ai-girlfriend-natsume <repo_path> --local-dir <你的目录>
#   或直接在 HF 网页下载单个文件
#
# 路径配置: 首次 clone 后运行 quick_setup.ps1 一键填写 config.yaml
# 模型下载后更新此文件的 local_path 指向你本地的实际目录

# ============================================================
# 路径变量
# 为了克隆后直接可用, 以下路径由 quick_setup.ps1 自动填写.
# 手动配置: 复制 .env.example 或运行 quick_setup.ps1
# ============================================================

models:
  # =========================================================================
  # 本地 LLM — llama.cpp GGUF
  # =========================================================================
  - name: Qwen3.6-35B-A3B-uncensored-heretic-APEX-I-Compact
    type: GGUF (Q4_K, 16.11 GB, 34.66B MoE, 8/256 experts)
    repo: TAOTAO777/ai-girlfriend-natsume
    repo_path: llm/Qwen3.6-35B-A3B-uncensored-heretic-APEX-I-Compact.gguf
    local_path: ${LLAMA_MODEL_DIR:-models/}
    download: |
      huggingface-cli download TAOTAO777/ai-girlfriend-natsume llm/Qwen3.6-35B-A3B-uncensored-heretic-APEX-I-Compact.gguf --local-dir models
    upstream: https://huggingface.co/mudler/Qwen3.6-35B-A3B-uncensored-heretic-APEX-GGUF
    license: Apache 2.0 (Qwen upstream)

  # =========================================================================
  # ComfyUI 文生图 Checkpoints
  # =========================================================================
  - name: WAI-Nsfw-Illustrious-17
    type: safetensors (SDXL/Illustrious, 6.46 GB)
    repo: TAOTAO777/ai-girlfriend-natsume
    repo_path: comfyui-checkpoints/WAI-Nsfw-Illustrious-17.safetensors
    local_path: ${COMFYUI_CHECKPOINTS_DIR:-checkpoints/}
    download: |
      huggingface-cli download TAOTAO777/ai-girlfriend-natsume comfyui-checkpoints/WAI-Nsfw-Illustrious-17.safetensors --local-dir checkpoints
    upstream: https://civitai.com/models/1185480/wai-nsfw-illustrious
    note: 二次元角色生成默认模型

  - name: miaomiaoHarem_v20
    type: safetensors (6.46 GB)
    repo: TAOTAO777/ai-girlfriend-natsume
    repo_path: comfyui-checkpoints/miaomiaoHarem_v20.safetensors
    local_path: ${COMFYUI_CHECKPOINTS_DIR:-checkpoints/}
    download: |
      huggingface-cli download TAOTAO777/ai-girlfriend-natsume comfyui-checkpoints/miaomiaoHarem_v20.safetensors --local-dir checkpoints
    upstream: https://civitai.com/models/1033365/miaomiaoharem
    note: 备用模型，动漫后宫风格

  # =========================================================================
  # GPT-SoVITS v2 Pro — 声优权重（自训练）
  # =========================================================================
  - name: GPT-SoVITS 声优权重
    type: SoVITS ckpt + GPT pth (共约 303 MB)
    repo: TAOTAO777/ai-girlfriend-natsume
    files:
      - repo_path: gpt-sovits-weights/GPT_weights_v2Pro/xxx-e30.ckpt
        local_path: ${SOVITS_ROOT:-GPT-SoVITS}/GPT_weights_v2Pro/
        note: SoVITS 权重（命名交叉：GPT目录放ckpt，SoVITS目录放pth）
      - repo_path: gpt-sovits-weights/SoVITS_weights_v2Pro/xxx_e20_s6240.pth
        local_path: ${SOVITS_ROOT:-GPT-SoVITS}/SoVITS_weights_v2Pro/
        note: GPT 权重（配对使用）
    download: |
      huggingface-cli download TAOTAO777/ai-girlfriend-natsume gpt-sovits-weights/ --local-dir gpt-sovits-weights --include "*.ckpt" "*.pth"
    note: 自训练声优模型，需两个文件配对使用。用你自己的声优数据训练替代

  # =========================================================================
  # 本地 Embedding 模型 — 语义记忆向量化
  # =========================================================================
  - name: all-MiniLM-L6-v2
    type: sentence-transformer (384-dim, ~80 MB)
    repo: sentence-transformers/all-MiniLM-L6-v2
    repo_path: N/A (自动下载到 HF cache)
    local_path: ${HF_HOME:-skills/sakura/runtime/hf-cache/}
    download: |
      首启自动下载: python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')"
    upstream: https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2
    license: Apache 2.0
    note: |
      为 OpenClaw memory_search 和 Sakura mem0 提供本地语义向量化，384 维
      服务: skills/shared/embedding_server.py (端口 9999)
      CPU 推理，毫秒级延迟，不占 VRAM
