<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏目 Live2D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: radial-gradient(ellipse at center, #2d2d44 0%, #1a1a2e 100%); display: flex; align-items: center; justify-content: center; }
  #overlay-text {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.78); color: #fff; font-size: 18px;
    padding: 12px 28px; border-radius: 24px;
    font-family: 'Yu Gothic', 'Meiryo UI', sans-serif;
    opacity: 0; transition: opacity 0.35s;
    pointer-events: none; z-index: 100; max-width: 85vw; text-align: center;
  }
  #overlay-text.visible { opacity: 1; }
  #status-dot {
    position: fixed; bottom: 16px; right: 16px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #f44; z-index: 100; transition: background 0.3s;
  }
  #status-dot.online { background: #4f4; box-shadow: 0 0 8px #4f4; }
</style>
</head>
<body>
<canvas id="live2d-canvas" style="width:100%;height:100%"></canvas>
<div id="overlay-text"></div>
<div id="status-dot"></div>

<!-- Cubism 2 shim: pixi-live2d-display checks for Live2D global even for Cubism4 models -->
<script>
(function(){var w=window;w.Live2D={};w.Live2DMotion=function(){};w.Live2DMotion.prototype={updateParam:function(){},update:function(){},setFadeIn:function(){},setFadeOut:function(){},setLoop:function(){},isFinished:function(){return true}};w.Live2DModelWebGL=function(){};w.Live2DModelWebGL.prototype={load:function(){},setTexture:function(){},setParamFloat:function(){},getParamFloat:function(){return 0},draw:function(){},setMatrix:function(){}};w.L2D={};w.AMotion=function(){};w.PhysicsHair=function(){};w.PhysicsHair.SRC_TO_X='SRC_TO_X';w.PhysicsHair.SRC_TO_Y='SRC_TO_Y';w.PhysicsHair.SRC_TO_G_ANGLE='SRC_TO_G_ANGLE';w.PhysicsHair.TARGET_FROM_ANGLE='TARGET_FROM_ANGLE';w.PhysicsHair.TARGET_FROM_ANGLE_V='TARGET_FROM_ANGLE_V';w.PhysicsHair.SRC_TO_X_OFFSET='SRC_TO_X_OFFSET';w.PhysicsHair.SRC_TO_Y_OFFSET='SRC_TO_Y_OFFSET';
w.PhysicsHair.Src=function(){};w.PhysicsHair.Src.prototype={setParam:function(){},getParam:function(){return 0}};
w.PhysicsHair.Target=function(){};w.PhysicsHair.Target.prototype={setParam:function(){},getParam:function(){return 0}};
w.PhysicsHair.prototype={update:function(){},setup:function(){},setWinSize:function(){}};
console.log('Cubism2 shim loaded');})();
</script>
<!-- Cubism Core (must be before pixi-live2d-display) -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<!-- PixiJS v7 UMD -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<!-- pixi-live2d-display v0.3.1 UMD -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.3.1/dist/index.min.js"></script>

<script>
console.log('=== Checking globals ===');
console.log('Live2DCubismCore:', typeof Live2DCubismCore);
console.log('PIXI.VERSION:', typeof PIXI !== 'undefined' ? PIXI.VERSION : 'MISSING');
console.log('PIXI.live2d:', typeof PIXI !== 'undefined' ? typeof PIXI.live2d : 'PIXI MISSING');
console.log('Live2DModel:', typeof PIXI !== 'undefined' && PIXI.live2d ? typeof PIXI.live2d.Live2DModel : 'NO live2d');
console.log('Cubism4Model:', typeof PIXI !== 'undefined' && PIXI.live2d ? typeof PIXI.live2d.Cubism4Model : 'NO live2d');
</script>
</body>
</html>
