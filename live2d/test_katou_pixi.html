<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>加藤惠 Pixi 测试</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #info { position: fixed; top: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; }
  #err { position: fixed; bottom: 10px; left: 10px; color: #f44; font-family: monospace; font-size: 14px; z-index: 10; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; max-width: 80vw; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">Loading...</div>
<div id="err"></div>

<script src="./node_modules/pixi.js/dist/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/live2d.min.js"></script>
<script src="./node_modules/pixi-live2d-display/dist/cubism2.min.js"></script>
<script src="./node_modules/pixi-live2d-display/dist/index.min.js"></script>

<script>
const info = document.getElementById('info');
const err = document.getElementById('err');

// Check globals
console.log('PIXI:', typeof PIXI);
console.log('PIXI.live2d:', typeof PIXI.live2d);
if (PIXI.live2d) {
  console.log('Live2DModel:', typeof PIXI.live2d.Live2DModel);
  console.log('Cubism2Model:', typeof PIXI.live2d.Cubism2Model);
}

async function main() {
  try {
    const canvas = document.getElementById('canvas');
    const app = new PIXI.Application({
      view: canvas, width: window.innerWidth, height: window.innerHeight,
      backgroundColor: 0x1a1a2e, antialias: true, resolution: window.devicePixelRatio || 1
    });

    // Try loading Katou Megumi via cubism2
    const modelPath = 'model/加藤惠live2d/model/katou_01/katou_01.model.json';
    info.textContent = 'Loading Katou via cubism2...';
    
    const model = await PIXI.live2d.Live2DModel.from(modelPath);
    info.textContent = 'SUCCESS! Katou loaded!';
    
    model.scale.set(0.5);
    model.anchor.set(0.5, 0.5);
    model.position.set(window.innerWidth / 2, window.innerHeight * 0.55);
    model.interactive = true;
    app.stage.addChild(model);

    document.addEventListener('mousemove', function(e) {
      var x = (e.clientX / window.innerWidth) * 2 - 1;
      var y = (e.clientY / window.innerHeight) * 2 - 1;
      var core = model.internalModel.coreModel;
      core.setParameterValueById('ParamAngleX', x * 8);
      core.setParameterValueById('ParamAngleY', y * 6);
    });
    
  } catch(e) {
    err.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

main();
</script>
</body>
</html>
