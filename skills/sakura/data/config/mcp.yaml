enabled: true
default_call_timeout: 20
servers:
  web:
    transport: stdio
    command: "{python}"
    args: ["{base_dir}/app/agent/mcp/web_search_server.py"]
    name_prefix: web__
    risk: low
    requires_confirmation: false
  windows:
    enabled: false
    transport: stdio
    command: "{uv}"
    args:
      - "--directory"
      - "{base_dir}/tools/mcp/Windows-MCP-0.8.0"
      - "run"
      - "windows-mcp"
      - "serve"
      - "--tools"
      - "App,Snapshot,Screenshot,Click,Type,Wait"
    env:
      ANONYMIZED_TELEMETRY: "false"
      WINDOWS_MCP_TOOLS: "App,Snapshot,Screenshot,Click,Type,Wait"
      WINDOWS_MCP_EXCLUDE_TOOLS: "PowerShell,Registry,Process,FileSystem,Clipboard,Scrape,MultiSelect,MultiEdit,Notification,Scroll,Move,Shortcut"
    name_prefix: windows__
    call_timeout: 30
    risk: high
    requires_confirmation: true
    include_tools:
      - App
      - Snapshot
      - Screenshot
      - Click
      - Type
      - Wait
    exclude_tools:
      - PowerShell
      - Registry
      - Process
      - FileSystem
      - Clipboard
      - Scrape
      - MultiSelect
      - MultiEdit
      - Notification
      - Scroll
      - Move
      - Shortcut
    tool_policies:
      Snapshot:
        risk: medium
        requires_confirmation: false
      Screenshot:
        risk: medium
        requires_confirmation: false
